apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ReDxOps/eni-observability-gitops
    targetRevision: main
    path: platform
  destination:
    server: https://kubernetes.default.svc
    namespace: alloy
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true